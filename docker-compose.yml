services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: jobcatch
      POSTGRES_PASSWORD: jobcatch
      POSTGRES_DB: jobcatch
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobcatch"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: .
    command: uvicorn config.asgi:application --host 0.0.0.0 --port 8080 --reload
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgis://jobcatch:jobcatch@db:5432/jobcatch
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/app
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  celery:
    build: .
    command: celery -A config worker -l info
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgis://jobcatch:jobcatch@db:5432/jobcatch
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/app
    depends_on:
      - backend
      - redis

volumes:
  pgdata:
